<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse meals and build a grocery list grouped by store.">
  <title>NOMS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <span class="header-title">NOMS</span>
  <span id="header-subtitle" class="header-sub"></span>
  <button id="btn-theme" class="btn-theme" aria-label="Toggle dark mode">🌙</button>
</header>

<!-- ── RECIPES VIEW ── -->
<main id="view-recipes" class="view">
  <section>
    <div class="section-title">Filter by tag</div>
    <div id="tag-list" role="group"></div>
  </section>
  <section>
    <div class="section-title">Recipes</div>
    <div class="search-wrap">
      <input type="search" id="recipe-search" class="search-input" placeholder="Search recipes…" aria-label="Search recipes">
      <button class="btn-clear-search hidden" data-target="recipe-search" aria-label="Clear search">✕</button>
    </div>
    <div id="recipe-list"></div>
  </section>
</main>

<!-- ── LIST VIEW ── -->
<main id="view-list" class="view hidden">
  <div id="list-empty" class="empty-state hidden">
    <p>No recipes selected yet.</p>
    <button class="btn btn-secondary" onclick="switchView('recipes')">Browse Recipes</button>
  </div>
  <div id="list-content">
    <section>
      <div class="section-title">Ingredients</div>
      <div id="ingredient-list"></div>
    </section>
    <section>
      <button id="btn-copy" class="btn btn-primary">Copy List to Clipboard</button>
      <div id="copy-feedback" role="status" aria-live="polite"></div>
    </section>
  </div>
</main>

<!-- ── INGREDIENTS VIEW ── -->
<main id="view-ingredients" class="view hidden">
  <section>
    <div class="section-title">All ingredients</div>
    <div class="search-wrap">
      <input type="search" id="ing-search" class="search-input" placeholder="Search ingredients…" aria-label="Search ingredients">
      <button class="btn-clear-search hidden" data-target="ing-search" aria-label="Clear search">✕</button>
    </div>
    <div id="registry-list"></div>
  </section>
</main>

<!-- ── BOTTOM NAV ── -->
<nav class="bottom-nav" role="navigation" aria-label="Main navigation">
  <button class="nav-btn active" data-view="recipes" onclick="switchView('recipes')">
    <span class="nav-icon">🍽</span>
    <span>Recipes</span>
  </button>
  <button class="nav-btn" data-view="list" onclick="switchView('list')">
    <span class="nav-icon">🛒</span>
    <span>List</span>
    <span id="cart-badge" class="badge hidden">0</span>
  </button>
  <button class="nav-btn" data-view="ingredients" onclick="switchView('ingredients')">
    <span class="nav-icon">🥦</span>
    <span>Ingredients</span>
  </button>
</nav>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
